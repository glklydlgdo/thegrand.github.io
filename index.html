<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peek A Booth - Photobooth</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { 
  font-family: 'Poppins', sans-serif;
  margin: 0;              /* ✅ remove white edges */
  min-height: 100dvh;     /* ✅ fix mobile viewport height */
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bounceSlow {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-18px); }
}

@keyframes floatSoft {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== CLASSES ===== */
.fade-up { opacity: 0; animation: fadeUp 0.7s ease forwards; }
.fade-1 { animation-delay: 0.1s; }
.fade-2 { animation-delay: 0.3s; }
.fade-3 { animation-delay: 0.5s; }

.animate-bounce-slow {
  animation: bounceSlow 3s ease-in-out infinite;
}

.animate-float-soft {
  animation: floatSoft 5s ease-in-out infinite;
}

.gradient-btn {
  background: linear-gradient(-45deg, #7c3aed, #9333ea, #6d28d9);
  background-size: 300% 300%;
  animation: gradientMove 4s ease infinite;
}

/* ICON FIX */
svg {
  stroke: currentColor;
}

.icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800 text-white overflow-hidden">

<!-- Background dots -->
<div class="absolute inset-0 pointer-events-none">
  <div class="absolute top-10 left-10 w-2 h-2 bg-blue-500 opacity-20 rounded-full animate-float-soft"></div>
  <div class="absolute top-1/4 right-16 w-3 h-3 bg-blue-500 opacity-20 rounded-full animate-float-soft"></div>
  <div class="absolute bottom-20 left-20 w-2 h-2 bg-blue-500 opacity-20 rounded-full animate-float-soft"></div>
</div>

<div class="text-center max-w-lg px-6 z-10">

  <!-- 🔥 LOGO -->
  <div class="fade-up fade-1 flex justify-center mb-6">
    <div class="relative animate-bounce-slow">

      <img src="assets/PEEK A BOOTH hori.png" class="w-48 md:w-56">
      <div class="absolute inset-0 bg-blue-500 opacity-60 blur-[80px] -z-10"></div>

      <div class="absolute inset-0 bg-blue-500 opacity-20 blur-3xl -z-10"></div>

    </div>
  </div>

  <!-- TITLE -->
  <h1 class="fade-up fade-1 text-4xl font-bold">
    We’re building
  </h1>
  <h1 class="fade-up fade-1 text-4xl font-bold mb-4">
    something amazing! ✨
  </h1>

  <!-- SUBTEXT -->
  <p class="fade-up fade-2 text-gray-400 mb-10">
    Our website is currently under development. 🛠️<br>
    👍 Follow us on social media for updates.
  </p>

  <!-- SOCIALS -->
  <div class="fade-up fade-3 flex justify-center gap-3 flex-wrap">

    <a href="https://www.facebook.com/peekaboothph" class="gradient-btn px-5 py-2.5 rounded-full flex items-center gap-2 hover:-translate-y-1 transition">
      <i data-lucide="facebook" class="icon"></i>
      Facebook
    </a>

    <a href="https://www.instagram.com/peekaboothph" class="gradient-btn px-5 py-2.5 rounded-full flex items-center gap-2 hover:-translate-y-1 transition">
      <i data-lucide="instagram" class="icon"></i>
      Instagram
    </a>

    <a href="https://www.tiktok.com/@peekaboothph" class="gradient-btn px-5 py-2.5 rounded-full flex items-center gap-2 hover:-translate-y-1 transition">
      <svg viewBox="0 0 24 24" fill="currentColor" class="icon">
        <path d="M19.589 6.686a4.793 4.793 0 0 1-3.77-1.92v8.828a4.804 4.804 0 1 1-4.804-4.804c.298 0 .59.027.874.08v2.483a2.32 2.32 0 1 0 1.605 2.212V2h2.325a4.79 4.79 0 0 0 3.77 2.252v2.434z"/>
      </svg>
      TikTok
    </a>

  </div>

  <!-- EMAIL -->
  <div class="fade-up fade-3 mt-12 pt-8 border-t border-white/10">
    <p class="text-gray-400 text-sm mb-2">Get in touch:</p>
    <a href="mailto:contact@peekaboothph.com" class="text-blue-400 font-semibold flex items-center justify-center gap-2">
      <i data-lucide="mail" class="icon"></i>
      contact@peekaboothph.com
    </a>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  lucide.createIcons();
});
</script>

</body>
</html>
