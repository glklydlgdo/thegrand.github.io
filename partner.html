<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111827">
<title>Partner - Peek A Booth</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        background-color: #0f172a;
        color: white;
        overflow: hidden;
    }

    /* ===== DYNAMIC MESH BACKGROUND ===== */
    .mesh-bg {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        background:
            radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0, transparent 50%),
            radial-gradient(at 100% 0%, rgba(249, 64, 22, 0.1) 0, transparent 50%),
            radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.15) 0, transparent 50%),
            radial-gradient(at 0% 100%, rgba(249, 115, 22, 0.1) 0, transparent 50%);
        filter: blur(80px);
    }

    /* ===== GIANT BACKGROUND TEXT ===== */
    .bg-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 25vw;
        font-weight: 900;
        color: rgba(255, 255, 255, 0.02);
        white-space: nowrap;
        user-select: none;
        z-index: 0;
        letter-spacing: -1vw;
    }

    /* Padding added to hero-content to prevent edge touching */
    .hero-content {
        position: relative;
        z-index: 10;
        text-align: center;
        padding-left: 24px;
        padding-right: 24px;
        width: 100%;
        box-sizing: border-box;
    }

    .status-badge {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 6px 16px;
        border-radius: 100px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .pulse-dot {
        width: 8px;
        height: 8px;
        background: #f94016;
        border-radius: 50%;
        box-shadow: 0 0 10px #f94016;
        animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }

    @keyframes pulse-ring {
        0% { transform: scale(.7); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(.7); opacity: 0.5; }
    }

    .title-container {
        animation: breath 8s ease-in-out infinite;
    }

    @keyframes breath {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
    }

    /* CLAMP PREVENTS TEXT FROM HITTING EDGES ON TABLETS/PHONES */
    .big-title {
        font-size: clamp(3rem, 16vw, 7rem); 
        line-height: 0.85;
        font-weight: 800;
        letter-spacing: -2px;
        width: 100%;
    }

    .hollow-alive {
        position: relative;
        color: transparent;
        -webkit-text-stroke: 1px rgba(255,255,255,0.3);
        background: linear-gradient(
            to right, 
            rgba(255,255,255,0) 0%, 
            rgba(255,255,255,0) 40%, 
            rgba(255,255,255,0.8) 50%, 
            rgba(255,255,255,0) 60%, 
            rgba(255,255,255,0) 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 4s linear infinite;
    }

    @keyframes shine {
        to { background-position: 200% center; }
    }

    .description-text {
        font-size: 0.9rem;
        line-height: 1.5;
        max-width: 320px;
        margin: 0 auto 3rem;
        color: rgba(209, 213, 219, 0.9);
    }

    .cta-link {
        position: relative;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    /* ===== DESKTOP ONLY OVERRIDES - REMAINS UNTOUCHED ===== */
    @media (min-width: 1024px) {
        .big-title {
            font-size: clamp(4rem, 12vw, 9rem);
            line-height: 0.85;
            letter-spacing: -4px;
        }
        .description-text {
            font-size: 1.25rem;
            max-width: 600px;
        }
        .hollow-alive {
            -webkit-text-stroke: 1.5px rgba(255,255,255,0.3);
        }
        .status-badge {
            padding: 8px 24px;
            font-size: 14px;
        }
        .social-icon i, .social-icon svg {
            width: 28px;
            height: 28px;
        }
    }
</style>
</head>

<body class="min-h-screen flex items-center justify-center">

    <div class="mesh-bg"></div>
    <div class="bg-text">PEEK</div>

    <div class="hero-content">
        <div class="fade-up status-badge mb-8 lg:mb-12">
            <span class="pulse-dot"></span>
            System: Developing
        </div>

        <div class="title-container">
            <h1 class="big-title mb-6 lg:mb-10">
                WORK IN<br>
                <span class="hollow-alive">PROGRESS</span>
            </h1>
        </div>

        <p class="description-text">
            We are currently building this section to match our new standard of <strong>epicness</strong>. 🔥🤘
        </p>

        <div class="flex flex-col items-center gap-8 lg:gap-12">
            <a href="index.html" class="cta-link flex items-center gap-3 lg:text-xl uppercase tracking-widest text-sm">
                <i data-lucide="arrow-left" class="w-5 h-5 lg:w-7 lg:h-7"></i>
                Return Home
            </a>

            <div class="flex items-center gap-8 lg:gap-10 opacity-40 hover:opacity-100 transition-opacity duration-500">
                <a href="https://instagram.com/peekaboothph" target="_blank" class="social-icon">
                    <i data-lucide="instagram" class="w-6 h-6"></i>
                </a>
                <a href="https://facebook.com/peekaboothph" target="_blank" class="social-icon">
                    <i data-lucide="facebook" class="w-6 h-6"></i>
                </a>
                <a href="https://tiktok.com/@peekaboothph" target="_blank" class="social-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
                    </svg>
                </a>
                <a href="mailto:contact@peekaboothph.com" class="social-icon">
                    <i data-lucide="mail" class="w-6 h-6"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
